name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi

          mkdir -p dist
          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="opstack-doctor_${version}_${goos}_${goarch}"
            mkdir -p "dist/${name}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${version}" \
              -o "dist/${name}/opstack-doctor" ./cmd/opstack-doctor
            tar -C "dist/${name}" -czf "dist/${name}.tar.gz" opstack-doctor
            rm -rf "dist/${name}"
          done

          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opstack-doctor-release-artifacts
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/SHA256SUMS \
            --title "${GITHUB_REF_NAME}" \
            --notes "Portable opstack-doctor binaries with SHA256 checksums. Verify downloads with \`sha256sum -c SHA256SUMS\`."
