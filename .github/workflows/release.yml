name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi

          mkdir -p dist
          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="opstack-doctor_${version}_${goos}_${goarch}"
            mkdir -p "dist/${name}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${version}" \
              -o "dist/${name}/opstack-doctor" ./cmd/opstack-doctor
            tar -C "dist/${name}" -czf "dist/${name}.tar.gz" opstack-doctor
            rm -rf "dist/${name}"
          done

          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Resolve release metadata
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(basename "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            tag="${GITHUB_REF_NAME}"
          else
            version="dev-${GITHUB_SHA::7}"
            tag="${version}"
          fi

          {
            echo "image=ghcr.io/${owner}/${repo}"
            echo "version=${version}"
            echo "tag=${tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: opstack-doctor-release-artifacts
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish container image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref_type == 'tag' }}
          build-args: |
            VERSION=${{ steps.release-meta.outputs.version }}
          tags: |
            ${{ steps.release-meta.outputs.image }}:${{ steps.release-meta.outputs.tag }}
            ${{ steps.release-meta.outputs.image }}:${{ steps.release-meta.outputs.version }}

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/SHA256SUMS \
            --title "${GITHUB_REF_NAME}" \
            --notes "Portable opstack-doctor binaries with SHA256 checksums and GHCR images at \`${{ steps.release-meta.outputs.image }}:${GITHUB_REF_NAME}\`. Verify downloads with \`sha256sum -c SHA256SUMS\`."
