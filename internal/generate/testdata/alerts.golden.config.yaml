chain:
  name: op-mainnet
  chain_id: 10

execution:
  reference_rpc: "http://op-geth.example.invalid"
  candidate_rpc: "http://op-reth.example.invalid"
  compare_blocks: 16
  max_head_lag_blocks: 4

op_nodes:
  - name: source-1
    role: source
    rpc: "http://source-1.example.invalid"
    metrics: "http://source-1.example.invalid:7300/metrics"
  - name: source-2
    role: source
    rpc: "http://source-2.example.invalid"
    metrics: "http://source-2.example.invalid:7300/metrics"
  - name: light-1
    role: light
    rpc: "http://light-1.example.invalid"
    metrics: "http://light-1.example.invalid:7300/metrics"
    follows: source-1
  - name: sequencer-1
    role: sequencer
    rpc: "http://sequencer-1.example.invalid"
    metrics: "http://sequencer-1.example.invalid:7300/metrics"
    follows: source-1

proxyd:
  enabled: true
  endpoints:
    - name: deriver-proxyd
      role: deriver
      rpc: "http://deriver-proxyd.example.invalid"
      metrics: "http://deriver-proxyd.example.invalid:9761/metrics"
      consensus_aware: true
      expected_backends:
        - source-1
        - source-2
    - name: edge-proxyd
      role: edge
      rpc: "http://edge-proxyd.example.invalid"
      metrics: "http://edge-proxyd.example.invalid:9761/metrics"
      consensus_aware: true
      expected_backends:
        - light-1
        - sequencer-1

interop:
  enabled: true
  supervisor:
    metrics: "http://op-supervisor.example.invalid:7300/metrics"
    expected_chains:
      - 10
      - 8453
  monitor:
    metrics: "http://op-interop-mon.example.invalid:7300/metrics"
  dependencies:
    - name: base
      chain_id: 8453
      rpc: "http://base.example.invalid"
      metrics: "http://base.example.invalid:7300/metrics"

thresholds:
  max_safe_lag_blocks: 20
  min_peer_count: 1
  max_rpc_latency_seconds: 2.0
