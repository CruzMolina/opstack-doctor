groups:
    - name: opstack-doctor.rules
      rules:
        - alert: OpNodeDown
          expr: op_node_default_up != 1
          for: 2m
          labels:
            severity: critical
          annotations:
            description: op_node_default_up is not 1. Check process health, metrics scrape target, and host networking.
            runbook: Generated by opstack-doctor. Assumes op-node metrics use the default metric names.
            summary: op-node is down
        - alert: L2SafeHeadNotAdvancing
          expr: increase(op_node_default_refs_number{ref=~".*safe.*|.*Safe.*",layer=~".*l2.*|.*L2.*"}[10m]) <= 0
          for: 10m
          labels:
            severity: warning
          annotations:
            description: Safe-head refs are not increasing. Label names vary; adapt ref/layer selectors to your op-node metrics labels.
            summary: L2 safe head is not advancing
        - alert: OpNodeLowPeerCount
          expr: (op_node_default_peer_count < 1) or (op_node_default_p2p_peer_count < 1)
          for: 5m
          labels:
            severity: warning
          annotations:
            description: P2P peer count is below the configured threshold. Check connectivity, bootnodes, peer limits, and firewalling.
            summary: op-node peer count is low
        - alert: OpNodeDerivationErrors
          expr: increase(op_node_default_derivation_errors_total[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            description: Derivation errors increased. Check L1 RPC health, derivation pipeline logs, and rollup config consistency.
            summary: op-node derivation errors observed
        - alert: OpNodePipelineResets
          expr: increase(op_node_default_pipeline_resets_total[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            description: Pipeline resets increased. Check derivation errors, L1 RPC reliability, and source-node stability.
            summary: op-node pipeline resets observed
        - alert: SourceOpNodeDown
          expr: op_node_default_up{node=~"source-1|source-2"} != 1
          for: 2m
          labels:
            severity: critical
          annotations:
            description: The source tier is a hard dependency for light and sequencer nodes. This rule assumes scrape labels identify source nodes.
            summary: source op-node is down
        - alert: ProxydEndpointUnhealthy
          expr: opstack_doctor_finding{id=~"proxyd\\..*\\.(rpc|head|chain_id)",severity="fail"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            description: opstack-doctor could not read the configured proxyd RPC endpoint or observed a chain/head failure. Requires scheduled doctor export metrics.
            summary: proxyd endpoint failed doctor readiness checks
        - alert: DeriverProxydNotConsensusAware
          expr: opstack_doctor_finding{id=~"proxyd\\..*\\.consensus_aware",severity="warn"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            description: The OP Labs source/light-node topology recommends consensus-aware proxyd in production. This alert reflects opstack-doctor config intent, not live TOML introspection.
            summary: deriver-tier proxyd is not declared consensus-aware
        - alert: ProxydMetricsUnavailable
          expr: opstack_doctor_finding{id=~"proxyd\\..*\\.metrics",severity="warn"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            description: The configured proxyd metrics endpoint is missing or unreachable. Check proxyd Prometheus listener and scrape config.
            summary: proxyd metrics are unavailable
        - alert: ProxydDown
          expr: proxyd_up != 1
          for: 2m
          labels:
            severity: critical
          annotations:
            description: proxyd_up is not 1. Check proxyd process health, listener health, and scrape target wiring.
            summary: proxyd is down
        - alert: ProxydBackendProbeUnhealthy
          expr: proxyd_backend_probe_healthy == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            description: A proxyd backend probe reports unhealthy. Check backend health endpoints, source/light-node processes, and network reachability.
            summary: proxyd backend probe is unhealthy
        - alert: ProxydBackendDegradedOrBanned
          expr: (proxyd_backend_degraded > 0) or (proxyd_consensus_backend_banned > 0)
          for: 5m
          labels:
            severity: warning
          annotations:
            description: proxyd marked a backend degraded or banned. Check backend latency, error rates, peer count, sync state, latest-block lag, and consensus divergence.
            summary: proxyd backend is degraded or banned
        - alert: ProxydNoConsensusBackends
          expr: proxyd_group_consensus_count <= 0
          for: 2m
          labels:
            severity: critical
          annotations:
            description: The consensus-aware backend group has no serving candidates. Check bans, probes, backend sync state, and consensus group filtering.
            summary: proxyd has no serving consensus backends
        - alert: ProxydBackendRequestLatencyHigh
          expr: proxyd_rpc_backend_request_duration_seconds{quantile=~"0.9|0.95|0.99"} > 2.000
          for: 5m
          labels:
            severity: warning
          annotations:
            description: Backend request duration quantiles exceed the configured threshold. Check backend node load, network latency, and proxyd timeout settings.
            summary: proxyd backend request latency is high
        - alert: ProxydBackendErrorRate
          expr: proxyd_backend_error_rate > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            description: proxyd reports backend request errors. Use request/error counters and backend logs to identify the failing backend and methods.
            summary: proxyd backend error rate is nonzero
        - alert: ProxydCLConsensusIssues
          expr: increase({__name__=~"proxyd_consensus_cl_(ban_.*|output_root_disagreement_total|no_pin_candidate_total)"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            description: CL/source-tier consensus counters increased. Check op-node backend health, local-safe behavior, output-root agreement, and pin candidate selection.
            summary: proxyd CL consensus issue observed
        - alert: OpSupervisorDown
          expr: '{__name__=~"op_supervisor_.*_up"} != 1'
          for: 2m
          labels:
            severity: critical
          annotations:
            description: op-supervisor up metric is not 1. Check process health, metrics scrape target, and supervisor dependencies.
            summary: op-supervisor is down
        - alert: OpSupervisorRefsMissing
          expr: absent({__name__=~"op_supervisor_.*_refs_number"})
          for: 10m
          labels:
            severity: warning
          annotations:
            description: Supervisor refs are absent. Confirm op-supervisor metrics are enabled and tracking local/cross safety heads per dependency-set chain.
            summary: op-supervisor refs are missing
        - alert: OpSupervisorAccessListVerifyFailures
          expr: increase({__name__=~"op_supervisor_.*_access_list_verify_failure"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            description: Access-list verification failures increased. Investigate cross-chain message references, dependency-set coverage, and supervisor logs.
            summary: op-supervisor access-list verification failures observed
        - alert: OpInteropMonitorDown
          expr: '{__name__=~"op_interop_mon_.*_up"} != 1'
          for: 2m
          labels:
            severity: critical
          annotations:
            description: op-interop-mon up metric is not 1. Check process health and metrics scrape target.
            summary: op-interop-mon is down
        - alert: OpInteropMonitorRiskyMessages
          expr: '{__name__=~"op_interop_mon_.*_message_status",status=~"invalid|missing|failed|failure|error|unknown"} > 0'
          for: 1m
          labels:
            severity: warning
          annotations:
            description: Invalid, missing, failed, error, or unknown executing-message statuses are nonzero. Investigate dependency-chain RPC health and message validation.
            summary: op-interop-mon observed risky message status
        - alert: OpInteropMonitorTerminalStatusChanges
          expr: '{__name__=~"op_interop_mon_.*_terminal_status_changes"} > 0'
          for: 1m
          labels:
            severity: warning
          annotations:
            description: Terminal message status changed. Treat valid/invalid flips as high-signal interop incidents.
            summary: op-interop-mon terminal status changes observed
        - alert: ExecutionCandidateLaggingReference
          expr: opstack_doctor_execution_candidate_lag_blocks{chain="op-mainnet"} > 4
          for: 5m
          labels:
            severity: warning
          annotations:
            description: Template alert for lag exported by opstack-doctor check --output prometheus or opstack-doctor export metrics.
            summary: execution candidate is lagging reference
        - alert: ExecutionBlockComparisonMismatch
          expr: opstack_doctor_execution_block_compare_match{chain="op-mainnet"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            description: opstack-doctor observed mismatched block fields across reference and candidate execution clients.
            summary: execution block comparison is failing
        - alert: ExecutionRPCSurfaceMismatch
          expr: opstack_doctor_execution_rpc_surface_match{chain="op-mainnet"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            description: opstack-doctor observed mismatched or unavailable read-only RPC outputs during migration comparison.
            summary: sampled execution RPC outputs differ
        - alert: ProxydHeadLaggingBackends
          expr: opstack_doctor_proxyd_head_lag_blocks{chain="op-mainnet",proxyd="deriver-proxyd"} > 20
          for: 5m
          labels:
            proxyd: deriver-proxyd
            severity: warning
          annotations:
            description: opstack-doctor observed the proxyd endpoint behind the latest readable backend. Check proxyd backend health and routing strategy.
            summary: proxyd RPC head is lagging declared backends
        - alert: ProxydHeadLaggingBackends
          expr: opstack_doctor_proxyd_head_lag_blocks{chain="op-mainnet",proxyd="edge-proxyd"} > 20
          for: 5m
          labels:
            proxyd: edge-proxyd
            severity: warning
          annotations:
            description: opstack-doctor observed the proxyd endpoint behind the latest readable backend. Check proxyd backend health and routing strategy.
            summary: proxyd RPC head is lagging declared backends
        - alert: LightNodeLaggingSource
          expr: op_node_default_refs_number{node="source-1",ref=~".*safe.*|.*Safe.*"} - op_node_default_refs_number{node="light-1",ref=~".*safe.*|.*Safe.*"} > 20
          for: 5m
          labels:
            node: light-1
            severity: warning
            source: source-1
          annotations:
            description: Template alert. Assumes Prometheus scrape labels include node and safe-ref labels; adjust selectors to your metric labels.
            summary: light/sequencer node is lagging its source
        - alert: LightNodeLaggingSource
          expr: op_node_default_refs_number{node="source-1",ref=~".*safe.*|.*Safe.*"} - op_node_default_refs_number{node="sequencer-1",ref=~".*safe.*|.*Safe.*"} > 20
          for: 5m
          labels:
            node: sequencer-1
            severity: warning
            source: source-1
          annotations:
            description: Template alert. Assumes Prometheus scrape labels include node and safe-ref labels; adjust selectors to your metric labels.
            summary: light/sequencer node is lagging its source
