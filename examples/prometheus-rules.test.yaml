rule_files:
  - prometheus-rules.example.yaml

evaluation_interval: 1m

tests:
  - name: doctor exported alert firing behavior
    interval: 1m
    input_series:
      - series: 'opstack_doctor_finding{chain="op-mainnet",id="interop.supervisor.expected_chains",severity="warn",target="interop.supervisor.metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'opstack_doctor_finding{chain="op-mainnet",id="interop.monitor.message_status",severity="warn",target="interop.monitor.metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'opstack_doctor_execution_candidate_lag_blocks{chain="op-mainnet"}'
        values: '5 5 5 5 5 5 5 5'
      - series: 'opstack_doctor_finding{chain="op-mainnet",id="proxyd.deriver-proxyd.rpc",severity="fail",target="proxyd.deriver-proxyd.rpc"}'
        values: '1 1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 3m
        alertname: ProxydEndpointUnhealthy
        exp_alerts:
          - exp_labels:
              chain: op-mainnet
              id: proxyd.deriver-proxyd.rpc
              severity: critical
              target: proxyd.deriver-proxyd.rpc
            exp_annotations:
              description: opstack-doctor could not read the configured proxyd RPC endpoint or observed a chain/head failure. Requires scheduled doctor export metrics.
              summary: proxyd endpoint failed doctor readiness checks
      - eval_time: 6m
        alertname: DoctorInteropSupervisorReadinessWarning
        exp_alerts:
          - exp_labels:
              chain: op-mainnet
              id: interop.supervisor.expected_chains
              severity: warning
              target: interop.supervisor.metrics
            exp_annotations:
              description: A scheduled opstack-doctor export observed a warning-level op-supervisor readiness finding. Inspect expected chain coverage, refs, and access-list evidence.
              summary: op-supervisor readiness warning
      - eval_time: 6m
        alertname: DoctorInteropMonitorReadinessWarning
        exp_alerts:
          - exp_labels:
              chain: op-mainnet
              id: interop.monitor.message_status
              severity: warning
              target: interop.monitor.metrics
            exp_annotations:
              description: A scheduled opstack-doctor export observed a warning-level op-interop-mon readiness finding. Inspect message status and terminal status change evidence.
              summary: op-interop-mon readiness warning
      - eval_time: 6m
        alertname: ExecutionCandidateLaggingReference
        exp_alerts:
          - exp_labels:
              chain: op-mainnet
              severity: warning
            exp_annotations:
              description: Template alert for lag exported by opstack-doctor check --output prometheus or opstack-doctor export metrics.
              summary: execution candidate is lagging reference

  - name: native interop alert firing behavior
    interval: 1m
    input_series:
      - series: 'op_supervisor_default_up{instance="supervisor-1"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'op_supervisor_default_access_list_verify_failure{chain="10"}'
        values: '0 0 0 1 1 1 2 2'
      - series: 'op_interop_mon_default_message_status{executing_chain_id="10",initiating_chain_id="8453",status="invalid"}'
        values: '2 2 2 2 2 2 2 2'
      - series: 'op_interop_mon_default_terminal_status_changes{executing_chain_id="10",initiating_chain_id="8453"}'
        values: '1 1 1 1 1 1 1 1'
    alert_rule_test:
      - eval_time: 3m
        alertname: OpSupervisorDown
        exp_alerts:
          - exp_labels:
              instance: supervisor-1
              severity: critical
            exp_annotations:
              description: op-supervisor up metric is not 1. Check process health, metrics scrape target, and supervisor dependencies.
              summary: op-supervisor is down
      - eval_time: 7m
        alertname: OpSupervisorAccessListVerifyFailures
        exp_alerts:
          - exp_labels:
              chain: "10"
              severity: warning
            exp_annotations:
              description: Access-list verification failures increased. Investigate cross-chain message references, dependency-set coverage, and supervisor logs.
              summary: op-supervisor access-list verification failures observed
      - eval_time: 2m
        alertname: OpInteropMonitorRiskyMessages
        exp_alerts:
          - exp_labels:
              executing_chain_id: "10"
              initiating_chain_id: "8453"
              severity: warning
              status: invalid
            exp_annotations:
              description: Invalid, missing, failed, error, or unknown executing-message statuses are nonzero. Investigate dependency-chain RPC health and message validation.
              summary: op-interop-mon observed risky message status
      - eval_time: 2m
        alertname: OpInteropMonitorTerminalStatusChanges
        exp_alerts:
          - exp_labels:
              executing_chain_id: "10"
              initiating_chain_id: "8453"
              severity: warning
            exp_annotations:
              description: Terminal message status changed. Treat valid/invalid flips as high-signal interop incidents.
              summary: op-interop-mon terminal status changes observed

  - name: healthy inputs do not fire representative alerts
    interval: 1m
    input_series:
      - series: 'opstack_doctor_finding{chain="op-mainnet",id="interop.supervisor.expected_chains",severity="ok",target="interop.supervisor.metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'opstack_doctor_finding{chain="op-mainnet",id="interop.monitor.message_status",severity="ok",target="interop.monitor.metrics"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'opstack_doctor_execution_candidate_lag_blocks{chain="op-mainnet"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'opstack_doctor_finding{chain="op-mainnet",id="proxyd.deriver-proxyd.rpc",severity="ok",target="proxyd.deriver-proxyd.rpc"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'op_supervisor_default_up{instance="supervisor-1"}'
        values: '1 1 1 1 1 1 1 1'
      - series: 'op_supervisor_default_access_list_verify_failure{chain="10"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'op_interop_mon_default_message_status{executing_chain_id="10",initiating_chain_id="8453",status="valid"}'
        values: '2 2 2 2 2 2 2 2'
      - series: 'op_interop_mon_default_message_status{executing_chain_id="10",initiating_chain_id="8453",status="invalid"}'
        values: '0 0 0 0 0 0 0 0'
      - series: 'op_interop_mon_default_terminal_status_changes{executing_chain_id="10",initiating_chain_id="8453"}'
        values: '0 0 0 0 0 0 0 0'
    alert_rule_test:
      - eval_time: 7m
        alertname: ProxydEndpointUnhealthy
        exp_alerts: []
      - eval_time: 7m
        alertname: DoctorInteropSupervisorReadinessWarning
        exp_alerts: []
      - eval_time: 7m
        alertname: DoctorInteropMonitorReadinessWarning
        exp_alerts: []
      - eval_time: 7m
        alertname: ExecutionCandidateLaggingReference
        exp_alerts: []
      - eval_time: 7m
        alertname: OpSupervisorDown
        exp_alerts: []
      - eval_time: 7m
        alertname: OpSupervisorAccessListVerifyFailures
        exp_alerts: []
      - eval_time: 7m
        alertname: OpInteropMonitorRiskyMessages
        exp_alerts: []
      - eval_time: 7m
        alertname: OpInteropMonitorTerminalStatusChanges
        exp_alerts: []
